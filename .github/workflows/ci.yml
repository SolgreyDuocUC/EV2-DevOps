name: CI/CD Pipeline Innovatech

# IE3: Trigger basado en la rama deploy
on:
  push:
    branches: ["deploy"]

jobs:
  # Fase 1: Construcción y subida a Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Frontend
        working-directory: ./frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Build y Push MS-Ventas
        working-directory: ./backend
        run: |
          docker build -f ms-ventas/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/ms-ventas:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-ventas:latest

      - name: Build y Push MS-Despachos
        working-directory: ./backend
        run: |
          docker build -f ms-despachos/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/ms-despachos:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-despachos:latest

  # Fase 2: Despliegue en AWS EC2 (Solo ocurre si la Fase 1 es exitosa)
  deploy-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # IE4 y IE9: Ejecución en EC2 mediante SSM (Sin usar llaves SSH)
      - name: Actualizar MS-Ventas en EC2
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_VENTAS_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/app && sudo docker compose pull ms-ventas && sudo docker compose up -d ms-ventas"]'

      - name: Actualizar MS-Despachos en EC2
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_DESPACHOS_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/app && sudo docker compose pull ms-despachos && sudo docker git addcompose up -d ms-despachos"]'

      - name: Actualizar Frontend en EC2
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_FRONTEND_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/app-frontend && sudo docker compose pull && sudo docker compose up -d"]'